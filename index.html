<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF BR.COIN | Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #05070a; --card: #111827; --accent: #00f2ff; --text: #ffffff; --dim: #9ca3af; --danger: #ff4d4d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        .hidden { display: none !important; }

        /* Header */
        .app-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: var(--card); border-bottom: 1px solid #1f2937;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-weight: 900; color: var(--accent); font-size: 18px; }
        .balance-chip { background: #1f2937; padding: 6px 15px; border-radius: 20px; border: 1px solid var(--accent); font-size: 14px; font-weight: bold; }

        /* Navigation */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: #000;
            display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1f2937; z-index: 1000;
        }
        .nav-item { color: var(--dim); font-size: 11px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .nav-item.active { color: var(--accent); }

        /* UI Cards */
        .card { background: var(--card); border-radius: 16px; padding: 20px; margin: 15px; border: 1px solid #1f2937; }
        .btn { width: 100%; padding: 14px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .btn-verifying { background: #374151; color: var(--accent); cursor: default; }
        .btn-danger { background: var(--danger); color: white; margin-top: 10px; font-size: 12px; padding: 8px; }

        input { width: 100%; padding: 14px; margin: 8px 0; background: #000; border: 1px solid #374151; color: white; border-radius: 10px; }
        
        .diamond-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .diamond-box { background: var(--card); border: 2px solid #1f2937; border-radius: 16px; padding: 20px; text-align: center; }
        .diamond-box.selected { border-color: var(--accent); background: rgba(0, 242, 255, 0.05); }

        /* Admin Styles */
        .admin-section-title { font-size: 14px; color: var(--accent); font-weight: bold; margin-bottom: 10px; border-left: 3px solid var(--accent); padding-left: 10px; }
    </style>
</head>
<body>

    <header class="app-header hidden" id="main-header">
        <div class="logo">FF BR.COIN</div>
        <div class="balance-chip"><span id="header-balance">0.0</span> <small>C</small></div>
    </header>

    <div id="splash" style="position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; z-index:10000;">
        <h2 style="color:var(--accent); letter-spacing:5px;">BR.COIN</h2>
    </div>

    <div id="view-auth" class="hidden">
        <div class="card" style="max-width:400px; margin: 60px auto; text-align:center;">
            <h2 id="auth-label">Login</h2>
            <input type="email" id="f-email" placeholder="Gmail">
            <input type="text" id="f-uid" placeholder="FF UID">
            <input type="password" id="f-pass" placeholder="Password">
            <input type="password" id="f-pass-confirm" class="hidden" placeholder="Confirm Password">
            <button class="btn" onclick="authAction()">Enter App</button>
            <p onclick="toggleAuth()" style="color:var(--dim); margin-top:20px; cursor:pointer;">New Account / Login</p>
        </div>
    </div>

    <div id="view-home" class="view hidden">
        <div class="diamond-grid">
            <div class="diamond-box" onclick="sel(this, 1426, 2100)">💎 1,426<br><small>2,100 C</small></div>
            <div class="diamond-box" onclick="sel(this, 3565, 5240)">💎 3,565<br><small>5,240 C</small></div>
            <div class="diamond-box" onclick="sel(this, 7130, 10480)">💎 7,130<br><small>10,480 C</small></div>
            <div class="diamond-box" onclick="sel(this, 14260, 20960)">💎 14,260<br><small>20,960 C</small></div>
        </div>
        <div style="padding:15px;"><button class="btn" onclick="redeem()">REDEEM NOW</button></div>
    </div>

    <div id="view-tasks" class="view hidden">
        <div id="task-list"></div>
    </div>

    <div id="view-profile" class="view hidden">
        <div class="card">
            <h3 style="margin-top:0; color:var(--accent);">Profile</h3>
            <p><small style="color:var(--dim)">GMAIL</small><br><b id="p-email">...</b></p>
            <p><small style="color:var(--dim)">FF UID</small><br><b id="p-uid">...</b></p>
            <button onclick="logout()" class="btn" style="background:#333; color:#fff; margin-top:20px;">LOGOUT</button>
        </div>
    </div>

    <div id="view-admin" class="view hidden">
        <div class="card">
            <div class="admin-section-title">CREATE NEW TASK</div>
            <input type="text" id="adm-name" placeholder="Task Name">
            <input type="number" id="adm-reward" placeholder="Reward Coins">
            <input type="text" id="adm-link" placeholder="Task Link">
            <button class="btn" onclick="postTask()">Add Task</button>
        </div>

        <div class="card">
            <div class="admin-section-title">MANAGE ALL TASKS</div>
            <div id="admin-global-tasks">Loading tasks...</div>
        </div>

        <div class="card">
            <div class="admin-section-title">PENDING APPROVALS</div>
            <div id="admin-pending">No requests.</div>
        </div>
    </div>

    <nav id="main-nav" class="nav-bar hidden">
        <div class="nav-item active" onclick="switchV('home', this)">Home</div>
        <div class="nav-item" onclick="switchV('tasks', this)">Tasks</div>
        <div class="nav-item" onclick="switchV('profile', this)">Profile</div>
        <div id="nav-admin" class="nav-item hidden" onclick="switchV('admin', this)" style="color:#ffcc00;">ADMIN</div>
    </nav>

    <script>
        const SB_URL = "https://zzehzlqhgjevwauycgdi.supabase.co"; 
        const SB_KEY = "sb_publishable_cs7l1-FeQnmB3Sl0bHfK7g_KK5qKlLh";
        const sb = supabase.createClient(SB_URL, SB_KEY);
        let userP = null, selectedPack = null;
        const adminEmail = "sa7530006@gmail.com";

        window.onload = () => { setTimeout(() => { document.getElementById('splash').style.display='none'; init(); }, 1500); };

        async function init() {
            const { data: { user } } = await sb.auth.getUser();
            if (user) loadApp(user); else document.getElementById('view-auth').classList.remove('hidden');
        }

        async function loadApp(user) {
            const { data: prof } = await sb.from('profiles').select('*').eq('id', user.id).single();
            userP = prof;
            document.getElementById('header-balance').innerText = parseFloat(prof.br_coins || 0).toFixed(1);
            document.getElementById('p-email').innerText = user.email;
            document.getElementById('p-uid').innerText = prof.ff_uid;
            
            document.getElementById('view-auth').classList.add('hidden');
            document.getElementById('main-header').classList.remove('hidden');
            document.getElementById('main-nav').classList.remove('hidden');

            if (user.email === adminEmail) {
                document.getElementById('nav-admin').classList.remove('hidden');
                switchV('admin', document.getElementById('nav-admin'));
            } else {
                switchV('home', document.querySelector('.nav-item'));
            }
        }

        function switchV(v, el) {
            document.querySelectorAll('.view').forEach(x => x.classList.add('hidden'));
            document.getElementById('view-' + v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
            if(v === 'tasks') fetchT();
            if(v === 'admin') refreshAdmin();
        }

        // --- USER TASKS ---
        async function fetchT() {
            const { data: allTasks } = await sb.from('tasks').select('*');
            const { data: mySubmissions } = await sb.from('task_submissions').select('task_id, status').eq('user_id', userP.id);
            
            let html = '';
            allTasks.forEach(t => {
                const sub = mySubmissions.find(s => s.task_id === t.id);
                // If the task is approved, it disappears completely
                if (sub && sub.status === 'approved') return; 

                const isPending = sub && sub.status === 'pending';

                html += `<div class="card">
                    <b>${t.title}</b> <span style="color:var(--accent); float:right">+${t.reward} C</span><br>
                    ${isPending ? '<button class="btn btn-verifying" style="margin-top:10px;">Verifying...</button>' : 
                    `<button class="btn" style="margin-top:10px;" onclick="startT('${t.id}', '${t.link}')">Start Task</button>`}
                </div>`;
            });
            document.getElementById('task-list').innerHTML = html || '<p style="text-align:center; padding:20px;">No tasks available.</p>';
        }

        async function startT(id, link) {
            window.open(link, '_blank');
            await sb.from('task_submissions').insert([{ user_id: userP.id, task_id: id, status: 'pending' }]);
            fetchT(); // Refresh UI to show "Verifying"
        }

        // --- ADMIN CONTROLS ---
        async function refreshAdmin() {
            // 1. Pending Submissions
            const { data: subs } = await sb.from('task_submissions').select('*, profiles(email), tasks(title, reward)').eq('status', 'pending');
            let h1 = '';
            subs.forEach(s => {
                h1 += `<div class="card" style="font-size:12px;">
                    ${s.profiles.email} completed <b>${s.tasks.title}</b><br>
                    <button class="btn" style="height:35px; margin-top:10px;" onclick="approve('${s.id}', '${s.user_id}', ${s.tasks.reward})">OK / Approve</button>
                </div>`;
            });
            document.getElementById('admin-pending').innerHTML = h1 || 'No pending tasks.';

            // 2. Global Task Management
            const { data: tasks } = await sb.from('tasks').select('*');
            let h2 = '';
            tasks.forEach(t => {
                h2 += `<div style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
                    <span>${t.title}</span>
                    <button class="btn btn-danger" style="width:auto;" onclick="deleteTaskGlobal('${t.id}')">Delete</button>
                </div>`;
            });
            document.getElementById('admin-global-tasks').innerHTML = h2 || 'No active tasks.';
        }

        async function approve(sid, uid, reward) {
            await sb.from('task_submissions').update({ status: 'approved' }).eq('id', sid);
            const { data } = await sb.from('profiles').select('br_coins').eq('id', uid).single();
            await sb.from('profiles').update({ br_coins: (data.br_coins + reward) }).eq('id', uid);
            alert("Task Approved!"); refreshAdmin();
        }

        async function deleteTaskGlobal(tid) {
            if(!confirm("Are you sure? This deletes the task for EVERYONE.")) return;
            await sb.from('tasks').delete().eq('id', tid);
            alert("Task Deleted!"); refreshAdmin();
        }

        async function postTask() {
            const title = document.getElementById('adm-name').value;
            const reward = document.getElementById('adm-reward').value;
            const link = document.getElementById('adm-link').value;
            await sb.from('tasks').insert([{ title, reward, link }]);
            alert("New Task Posted!"); refreshAdmin();
        }

        // --- HELPERS ---
        function sel(el, d, c) { document.querySelectorAll('.diamond-box').forEach(b => b.classList.remove('selected')); el.classList.add('selected'); selectedPack = {d, c}; }
        function redeem() { if(!selectedPack) return alert("Select pack!"); if(userP.br_coins < selectedPack.c) return alert("No coins!"); alert("Your diamond redeem in 2 business day"); }
        function toggleAuth() { isReg = !isReg; document.getElementById('auth-label').innerText = isReg ? "Register" : "Login"; document.getElementById('f-pass-confirm').classList.toggle('hidden'); }
        async function authAction() {
            const email = document.getElementById('f-email').value;
            const pass = document.getElementById('f-pass').value;
            if(isReg) {
                const { data } = await sb.auth.signUp({ email, password: pass });
                const ref = Math.random().toString(36).substring(2, 8).toUpperCase();
                await sb.from('profiles').insert([{ id: data.user.id, email, ff_uid: document.getElementById('f-uid').value, referral_code: ref }]);
                alert("Account created!"); location.reload();
            } else {
                const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
                if(error) alert(error.message); else loadApp(data.user);
            }
        }
        function logout() { sb.auth.signOut(); location.reload(); }
    </script>
</body>
    </html>
