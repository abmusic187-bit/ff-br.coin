<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR.COIN Admin & User App</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --app-bg: #0b0f1a;
            --card-bg: #161b2c;
            --accent: #00d2ff;
            --text-main: #ffffff;
            --text-dim: #8a99af;
            --admin-gold: #ffcc00;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--app-bg); color: var(--text-main); margin: 0; padding-bottom: 70px; }

        #splash {
            position: fixed; inset: 0; background: #000;
            display: flex; align-items: center; justify-content: center; z-index: 10000;
        }

        .hidden { display: none !important; }

        /* Navigation */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: var(--card-bg);
            display: flex; justify-content: space-around; padding: 12px 0;
            border-top: 1px solid #2d3748; z-index: 999;
        }
        .nav-item { color: var(--text-dim); font-size: 12px; cursor: pointer; font-weight: bold; }
        .nav-item.active { color: var(--accent); }

        /* UI Elements */
        .card { background: var(--card-bg); border-radius: 12px; padding: 20px; margin: 15px; border: 1px solid #2d3748; }
        input { width: 100%; padding: 14px; margin: 8px 0; background: #050810; border: 1px solid #2d3748; color: white; border-radius: 8px; }
        button { width: 100%; padding: 14px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        /* Admin Specific */
        .admin-badge { background: var(--admin-gold); color: black; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="splash"><h2>BR.COIN</h2></div>

    <div id="view-auth" class="hidden">
        <div class="card" style="max-width: 400px; margin: 80px auto; text-align: center;">
            <h2 id="auth-label">Welcome</h2>
            <input type="email" id="f-email" placeholder="Gmail">
            <input type="text" id="f-uid" placeholder="FF UID">
            <input type="password" id="f-pass" placeholder="Password">
            <input type="password" id="f-pass-confirm" class="hidden" placeholder="Confirm Password">
            <button onclick="authAction()">Enter App</button>
            <p onclick="toggleAuth()" style="color: var(--text-dim); cursor:pointer; margin-top:15px; font-size:13px;">Create Account / Login</p>
        </div>
    </div>

    <div id="view-admin" class="view hidden">
        <div class="card" style="border: 2px solid var(--admin-gold);">
            <h3 style="color:var(--admin-gold)">ADMIN PANEL</h3>
            <p>Create Task for Users:</p>
            <input type="text" id="adm-t-name" placeholder="Task Name (e.g. Subscribe)">
            <input type="number" id="adm-t-reward" placeholder="Reward (Coins)">
            <input type="text" id="adm-t-url" placeholder="Task Link (URL)">
            <button onclick="adminPostTask()" style="background:var(--admin-gold)">Post Task Now</button>
        </div>
        <div class="card">
            <h4>User Submissions</h4>
            <div id="admin-sub-list">No pending tasks.</div>
        </div>
    </div>

    <div id="view-home" class="view hidden">
        <div class="card">
            <div style="display:flex; justify-content: space-between;">
                <div>
                    <small style="color:var(--text-dim)">User Profile</small>
                    <div id="h-email" style="font-weight:bold;">...</div>
                </div>
                <div style="text-align:right">
                    <small style="color:var(--text-dim)">BR.COINS</small>
                    <div id="h-balance" style="color:var(--accent); font-weight:bold; font-size:20px;">0.0</div>
                </div>
            </div>
        </div>
        <div style="padding:0 15px;"><h4>Top-up Diamonds</h4></div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:15px;">
            <div class="card" style="margin:0; text-align:center;" onclick="buy(1426, 2100)">💎 1,426<br><small>2,100 C</small></div>
            <div class="card" style="margin:0; text-align:center;" onclick="buy(3565, 5240)">💎 3,565<br><small>5,240 C</small></div>
        </div>
    </div>

    <div id="view-tasks" class="view hidden">
        <div style="padding:20px;"><h3>Earn Coins</h3></div>
        <div id="user-task-list"></div>
    </div>

    <div id="view-profile" class="view hidden">
        <div class="card">
            <p><b>EMAIL:</b> <span id="p-email">...</span></p>
            <p><b>UID:</b> <span id="p-uid">...</span></p>
            <p><b>REF CODE:</b> <span id="p-ref" style="color:var(--accent)">...</span></p>
            <button onclick="logout()" style="background: #333; color: white; margin-top:20px;">Logout</button>
        </div>
    </div>

    <nav id="main-nav" class="nav-bar hidden">
        <div class="nav-item active" onclick="switchView('home', this)">Home</div>
        <div class="nav-item" onclick="switchView('tasks', this)">Tasks</div>
        <div class="nav-item" onclick="switchView('profile', this)">Profile</div>
        <div id="admin-nav-item" class="nav-item hidden" onclick="switchView('admin', this)" style="color:var(--admin-gold)">ADMIN</div>
    </nav>

    <script>
        const SB_URL = "https://zzehzlqhgjevwauycgdi.supabase.co"; 
        const SB_KEY = "sb_publishable_cs7l1-FeQnmB3Sl0bHfK7g_KK5qKlLh";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let userProfile = null;
        let isReg = false;
        const ADMIN_EMAIL = "sa7530006@gmail.com";

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                init();
            }, 1000);
        };

        async function init() {
            const { data: { user } } = await sb.auth.getUser();
            if (user) loadApp(user);
            else document.getElementById('view-auth').classList.remove('hidden');
        }

        function toggleAuth() {
            isReg = !isReg;
            document.getElementById('auth-label').innerText = isReg ? "Register" : "Login";
            document.getElementById('f-pass-confirm').classList.toggle('hidden');
        }

        async function authAction() {
            const email = document.getElementById('f-email').value.trim();
            const pass = document.getElementById('f-pass').value;
            const uid = document.getElementById('f-uid').value;

            if (isReg) {
                const { data, error } = await sb.auth.signUp({ email, password: pass });
                if (error) return alert(error.message);
                const ref = Math.random().toString(36).substring(2, 8).toUpperCase();
                await sb.from('profiles').insert([{ id: data.user.id, email, ff_uid: uid, referral_code: ref }]);
                alert("Account created!");
                location.reload();
            } else {
                const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
                if (error) return alert(error.message);
                loadApp(data.user);
            }
        }

        async function loadApp(user) {
            // ADMIN CHECK FIRST
            if (user.email === ADMIN_EMAIL) {
                document.getElementById('admin-nav-item').classList.remove('hidden');
                switchView('admin', document.getElementById('admin-nav-item'));
            } else {
                switchView('home', document.querySelector('.nav-item'));
            }

            const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
            userProfile = profile || { email: user.email, ff_uid: 'N/A', br_coins: 0 };
            
            // Sync Data
            document.getElementById('h-email').innerText = user.email;
            document.getElementById('p-email').innerText = user.email;
            document.getElementById('h-balance').innerText = parseFloat(userProfile.br_coins || 0).toFixed(1);
            document.getElementById('p-uid').innerText = userProfile.ff_uid;
            document.getElementById('p-ref').innerText = userProfile.referral_code || 'ADMIN';

            document.getElementById('view-auth').classList.add('hidden');
            document.getElementById('main-nav').classList.remove('hidden');
        }

        function switchView(v, el) {
            document.querySelectorAll('.view').forEach(x => x.classList.add('hidden'));
            document.getElementById('view-' + v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
            if(v === 'tasks') fetchTasks();
        }

        async function adminPostTask() {
            const title = document.getElementById('adm-t-name').value;
            const reward = document.getElementById('adm-t-reward').value;
            const link = document.getElementById('adm-t-url').value;
            const { error } = await sb.from('tasks').insert([{ title, reward, link }]);
            if (error) alert(error.message); else alert("Task Posted!");
        }

        async function fetchTasks() {
            const { data } = await sb.from('tasks').select('*');
            let h = '';
            data.forEach(t => {
                h += `<div class="card"><b>${t.title}</b><br><small>${t.reward} Coins</small><br>
                      <button onclick="window.open('${t.link}'); submitT('${t.id}')" style="margin-top:10px; height:30px; padding:0;">Start Task</button></div>`;
            });
            document.getElementById('user-task-list').innerHTML = h || 'No tasks.';
        }

        async function submitT(id) {
            await sb.from('task_submissions').insert([{ user_id: userProfile.id, task_id: id }]);
            alert("Sent to admin for approval!");
        }

        function logout() { sb.auth.signOut(); location.reload(); }
    </script>
</body>
                </html>
