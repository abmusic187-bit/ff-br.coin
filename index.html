<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR.COIN App</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --app-bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--app-bg); 
            color: var(--text-main); 
            margin: 0; 
            padding-bottom: 80px; /* Space for nav */
        }

        /* Loading */
        #splash {
            position: fixed; inset: 0; background: var(--app-bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; transition: opacity 0.5s;
        }

        .hidden { display: none !important; }

        /* App UI Components */
        .app-header { padding: 25px 20px; background: var(--card-bg); border-bottom: 1px solid #334155; }
        .section-title { font-size: 24px; font-weight: 800; margin-bottom: 20px; color: var(--accent); }
        
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin: 15px;
            border: 1px solid #334155;
        }

        input {
            width: 100%; padding: 14px; margin: 10px 0;
            background: #0f172a; border: 1px solid #334155;
            color: white; border-radius: 12px; font-size: 16px;
        }

        .btn-primary {
            width: 100%; padding: 15px; background: var(--accent);
            color: #000; border: none; border-radius: 12px;
            font-weight: 800; text-transform: uppercase; cursor: pointer;
        }

        /* Bottom Navigation */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%;
            background: var(--card-bg);
            display: flex; justify-content: space-around;
            padding: 15px 0; border-top: 1px solid #334155;
            z-index: 999;
        }
        .nav-item { color: var(--text-dim); text-align: center; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: var(--accent); font-weight: bold; }

        /* Diamond Grid */
        .diamond-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .diamond-box {
            background: var(--card-bg); border: 1px solid #334155;
            padding: 20px; border-radius: 16px; text-align: center;
        }

        /* Task List */
        .task-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid #334155;
        }
    </style>
</head>
<body>

    <div id="splash">
        <h1 style="color: var(--accent); font-size: 40px; margin:0;">BR.COIN</h1>
        <div style="width: 30px; height: 30px; border: 3px solid #334155; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s infinite linear;"></div>
    </div>

    <div id="view-auth" class="hidden">
        <div style="padding: 40px 20px; text-align: center;">
            <h2 id="auth-label">Login to App</h2>
            <input type="email" id="f-email" placeholder="Email">
            <input type="text" id="f-uid" placeholder="FF UID">
            <input type="password" id="f-pass" placeholder="Password">
            <input type="password" id="f-pass-confirm" class="hidden" placeholder="Confirm Password">
            <button class="btn-primary" onclick="authAction()">Continue</button>
            <p onclick="toggleAuth()" style="color: var(--text-dim); margin-top: 20px; cursor:pointer;">Switch to Register/Login</p>
        </div>
    </div>

    <div id="view-home" class="view hidden">
        <div class="app-header">
            <div style="display:flex; justify-content: space-between; align-items:center;">
                <div>
                    <span style="color: var(--text-dim); font-size: 12px;">Welcome back,</span>
                    <div id="h-email" style="font-weight:bold;">...</div>
                </div>
                <div style="background: var(--accent); color:#000; padding:8px 15px; border-radius:10px; text-align:center;">
                    <small style="font-size:9px; display:block;">BR.COIN</small>
                    <b id="h-balance">0.0</b>
                </div>
            </div>
        </div>
        <div class="section-title" style="padding: 20px 20px 0;">Top-up Diamonds</div>
        <div class="diamond-grid" id="diamond-list">
            <div class="diamond-box" onclick="buy(1426, 2100)">💎 1,426<br><span style="color:var(--accent)">2,100 C</span></div>
            <div class="diamond-box" onclick="buy(3565, 5240)">💎 3,565<br><span style="color:var(--accent)">5,240 C</span></div>
            <div class="diamond-box" onclick="buy(7130, 10480)">💎 7,130<br><span style="color:var(--accent)">10,480 C</span></div>
            <div class="diamond-box" onclick="buy(14260, 20960)">💎 14,260<br><span style="color:var(--accent)">20,960 C</span></div>
        </div>
    </div>

    <div id="view-tasks" class="view hidden">
        <div class="app-header"><div class="section-title">Task Center</div></div>
        <div id="task-container" style="padding: 10px;">
            <p style="text-align:center; color:var(--text-dim);">Loading tasks...</p>
        </div>
    </div>

    <div id="view-profile" class="view hidden">
        <div class="app-header"><div class="section-title">Account Profile</div></div>
        <div class="card">
            <div style="margin-bottom:15px;">
                <label style="color:var(--text-dim); font-size:12px;">GMAIL</label>
                <div id="p-email" style="font-size:18px; font-weight:bold;">...</div>
            </div>
            <div style="margin-bottom:15px;">
                <label style="color:var(--text-dim); font-size:12px;">FREE FIRE UID</label>
                <div id="p-uid" style="font-size:18px; font-weight:bold;">...</div>
            </div>
            <div style="margin-bottom:15px;">
                <label style="color:var(--text-dim); font-size:12px;">MY BALANCE</label>
                <div id="p-balance" style="font-size:18px; font-weight:bold; color:var(--accent);">0.0 BR.COIN</div>
            </div>
            <hr style="border: 0.5px solid #334155; margin: 20px 0;">
            <div style="background:#0f172a; padding:15px; border-radius:12px; text-align:center;">
                <small style="color:var(--text-dim)">REFERRAL CODE</small>
                <div id="p-ref" style="font-size:22px; letter-spacing:4px; font-weight:bold; margin-top:5px;">-------</div>
            </div>
            <button onclick="logout()" style="background:var(--danger); margin-top:30px;" class="btn-primary">Logout Account</button>
        </div>
    </div>

    <nav class="nav-bar hidden" id="main-nav">
        <div class="nav-item active" onclick="switchView('home', this)">Home</div>
        <div class="nav-item" onclick="switchView('tasks', this)">Tasks</div>
        <div class="nav-item" onclick="switchView('profile', this)">Profile</div>
    </nav>

    <script>
        const SB_URL = "https://zzehzlqhgjevwauycgdi.supabase.co"; 
        const SB_KEY = "sb_publishable_cs7l1-FeQnmB3Sl0bHfK7g_KK5qKlLh";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let userProfile = null;
        let isReg = false;

        // Force Finish Splash
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    init();
                }, 500);
            }, 1000);
        });

        async function init() {
            const { data: { user } } = await sb.auth.getUser();
            if (user) loadApp(user);
            else document.getElementById('view-auth').classList.remove('hidden');
        }

        function switchView(viewId, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + viewId).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(viewId === 'tasks') renderTasks();
        }

        function toggleAuth() {
            isReg = !isReg;
            document.getElementById('auth-label').innerText = isReg ? "Create Account" : "Login to App";
            document.getElementById('f-pass-confirm').classList.toggle('hidden');
        }

        async function authAction() {
            const email = document.getElementById('f-email').value;
            const pass = document.getElementById('f-pass').value;
            const uid = document.getElementById('f-uid').value;

            if(isReg) {
                const { data, error } = await sb.auth.signUp({ email, password: pass });
                if(error) return alert(error.message);
                const ref = Math.random().toString(36).substring(2, 8).toUpperCase();
                await sb.from('profiles').insert([{ id: data.user.id, email, ff_uid: uid, referral_code: ref }]);
                alert("Account created! Please login.");
                location.reload();
            } else {
                const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
                if(error) return alert(error.message);
                loadApp(data.user);
            }
        }

        async function loadApp(user) {
            const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
            userProfile = profile;
            
            // Populate UI
            document.getElementById('h-email').innerText = profile.email;
            document.getElementById('h-balance').innerText = parseFloat(profile.br_coins || 0).toFixed(1);
            document.getElementById('p-email').innerText = profile.email;
            document.getElementById('p-uid').innerText = profile.ff_uid;
            document.getElementById('p-balance').innerText = parseFloat(profile.br_coins || 0).toFixed(1) + " BR.COIN";
            document.getElementById('p-ref').innerText = profile.referral_code;

            document.getElementById('view-auth').classList.add('hidden');
            document.getElementById('view-home').classList.remove('hidden');
            document.getElementById('main-nav').classList.remove('hidden');
        }

        async function renderTasks() {
            const { data: tasks } = await sb.from('tasks').select('*');
            let html = '';
            tasks.forEach(t => {
                html += `
                <div class="card task-item">
                    <div>
                        <div style="font-weight:bold;">${t.title}</div>
                        <div style="color:var(--accent); font-size:12px;">+${t.reward} BR.COIN</div>
                    </div>
                    <button style="width:auto; padding:8px 15px; font-size:12px;" class="btn-primary" onclick="window.open('${t.link}'); submitTask('${t.id}')">Start</button>
                </div>`;
            });
            document.getElementById('task-container').innerHTML = html || '<p style="text-align:center">No tasks available</p>';
        }

        async function submitTask(tid) {
            await sb.from('task_submissions').insert([{ user_id: userProfile.id, task_id: tid }]);
            alert("Verification submitted! Coins will be added after approval.");
        }

        async function logout() {
            await sb.auth.signOut();
            location.reload();
        }

        function buy(d, c) {
            if(userProfile.br_coins < c) alert("Insufficient BR.COINS!");
            else alert(`Request for ${d} Diamonds submitted to admin.`);
        }
    </script>
    <style> @keyframes spin { 100% { transform: rotate(360deg); } } </style>
</body>
                                    </html>
