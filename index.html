<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR.COIN | Rewards</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fdfdfd; --blue: #0066ff; --text: #121212; --red: #ff3b3b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        .hidden { display: none !important; }

        .app-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; background: white; border-top: 6px solid var(--blue);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-family: 'Montserrat', sans-serif; font-weight: 900; color: var(--blue); font-size: 20px; }
        .balance-chip { font-weight: 800; color: black; font-size: 15px; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--blue); display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav-item { color: rgba(255,255,255,0.6); font-size: 11px; cursor: pointer; font-weight: 700; text-transform: uppercase; }
        .nav-item.active { color: white; border-bottom: 2px solid white; }

        .card { background: white; border-radius: 12px; padding: 20px; margin: 15px; border: 1px solid #eee; }
        .btn { 
            width: 100%; padding: 16px; background: var(--blue); color: white; border: none; 
            border-radius: 10px; font-weight: 800; cursor: pointer; position: relative;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .btn-red { background: var(--red); margin-top: 10px; }
        
        .spinner { width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        input, select, textarea { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; }
        input:read-only { background: #f0f0f0; color: #888; cursor: not-allowed; }
        
        .stage-box { display: flex; gap: 8px; margin: 10px 0; }
        .light { width: 14px; height: 14px; border-radius: 50%; background: #e0e0e0; border: 1px solid #ccc; }
        .light.active { background: var(--red); box-shadow: 0 0 8px var(--red); }

        #splash { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        #toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); z-index: 10001; background: #333; color: white; padding: 12px 20px; border-radius: 8px; display: none; }
        
        .task-reward-tag { color: var(--blue); font-weight: 800; font-size: 14px; margin-bottom: 5px; display: block; }
        .admin-sub-card { border-left: 5px solid var(--blue); margin-bottom: 10px; padding: 10px; background: #f9f9f9; }
    </style>
</head>
<body>

    <div id="toast"></div>
    <div id="splash"><h1 class="logo" style="font-size:32px">BR.COIN</h1></div>

    <header class="app-header hidden" id="main-header">
        <div class="logo">BR.COIN</div>
        <div class="balance-chip"><span id="h-bal">0.00</span> 🪙</div>
    </header>

    <div id="view-auth" class="hidden" style="text-align:center; padding-top:100px;">
        <h1 class="logo" style="font-size:40px">BR.COIN</h1>
        <div style="padding:40px">
            <button class="btn" id="login-btn" onclick="loginWithGoogle()">
                <div class="spinner"></div> Sign in with Google
            </button>
        </div>
    </div>

    <div id="view-home" class="view hidden">
        <div class="card">
            <h3>Withdraw PKR</h3>
            <p style="font-size:12px; color:gray">42 Coins = 30 PKR</p>
            <select id="wd-method" onchange="renderWd()">
                <option value="ep">Easypaisa</option>
                <option value="jc">JazzCash</option>
                <option value="usdt">USDT (TRC20)</option>
            </select>
            <div id="wd-opts" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;"></div>
            <button class="btn" id="wd-btn" style="margin-top:20px" onclick="requestWithdraw()">
                <div class="spinner"></div> <span>Withdraw Now</span>
            </button>
        </div>
    </div>

    <div id="view-tasks" class="view hidden"><div id="task-list"></div></div>

    <div id="view-profile" class="view hidden">
        <div class="card" style="text-align:center">
            <h1 id="p-bal" style="color:var(--blue); font-size:40px">0.00</h1>
            <p id="p-name">Loading...</p>
        </div>
        <div class="card">
            <h4 style="margin:0">EasyPaisa</h4>
            <input id="up-ep-n" placeholder="Name"> <input id="up-ep-v" placeholder="Number">
            <h4 style="margin:10px 0 0 0">JazzCash</h4>
            <input id="up-jc-n" placeholder="Name"> <input id="up-jc-v" placeholder="Number">
            <h4 style="margin:10px 0 0 0">USDT Address</h4>
            <input id="up-usdt" placeholder="TRC20 Address">
            <button class="btn" id="save-prof-btn" onclick="saveProfile()">
                <div class="spinner"></div> <span>Save Details (Permanent)</span>
            </button>
        </div>
        <div style="padding:15px"><button onclick="logout()" style="color:red; background:none; border:none; width:100%; font-weight:bold">Logout</button></div>
    </div>

    <div id="view-admin" class="view hidden">
        <div class="card">
            <h4>Manage Tasks (Delete)</h4>
            <div id="ad-task-manage"></div>
        </div>
        <div class="card">
            <h4>Task Submissions</h4>
            <div id="ad-subs"></div>
        </div>
        <div class="card" style="border-top: 5px solid var(--red);">
            <h4>Withdrawal Requests</h4>
            <div id="ad-withdrawals"></div>
        </div>
        <div class="card">
            <h4>Create New Task</h4>
            <input id="ad-t" placeholder="Title"> <input id="ad-l" placeholder="Link">
            <input id="ad-s" type="number" placeholder="Stages"> <input id="ad-r" placeholder="Rewards (e.g. 10,20)">
            <textarea id="ad-d" placeholder="Description"></textarea>
            <button class="btn" onclick="createTask()">Create</button>
        </div>
    </div>

    <nav id="main-nav" class="nav-bar hidden">
        <div class="nav-item active" onclick="switchV('home', this)">Shop</div>
        <div class="nav-item" onclick="switchV('tasks', this)">Tasks</div>
        <div class="nav-item" onclick="switchV('profile', this)">Profile</div>
        <div id="nav-admin" class="nav-item hidden" onclick="switchV('admin', this)">Admin</div>
    </nav>

    <script>
        const SB_URL = "https://zzehzlqhgjevwauycgdi.supabase.co"; 
        const SB_KEY = "sb_publishable_cs7l1-FeQnmB3Sl0bHfK7g_KK5qKlLh";
        const sb = supabase.createClient(SB_URL, SB_KEY);
        let userP = null, selectedCoins = 0, selectedPKR = 0;
        const ADMIN_EMAIL = "sa7530006@gmail.com";

        function notify(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function showSplash(callback) {
            const s = document.getElementById('splash');
            s.classList.remove('hidden');
            setTimeout(() => { s.classList.add('hidden'); if(callback) callback(); }, 1000);
        }

        function buttonLoading(btnId, start) {
            const btn = document.getElementById(btnId);
            if(!btn) return;
            const spin = btn.querySelector('.spinner');
            if(start) { btn.disabled = true; spin.style.display = 'block'; }
            else { setTimeout(() => { btn.disabled = false; spin.style.display = 'none'; }, 2000); }
        }

        window.onload = async () => {
            const { data: { user } } = await sb.auth.getUser();
            if (user) {
                let { data: prof } = await sb.from('profiles').select('*').eq('id', user.id).single();
                userP = prof;
                initApp();
            } else {
                document.getElementById('splash').classList.add('hidden');
                document.getElementById('view-auth').classList.remove('hidden');
            }
        };

        function initApp() {
            updateUI();
            setProfileField('up-ep-n', userP.ep_name);
            setProfileField('up-ep-v', userP.ep_no);
            setProfileField('up-jc-n', userP.jc_name);
            setProfileField('up-jc-v', userP.jc_no);
            setProfileField('up-usdt', userP.usdt_addr);

            document.getElementById('splash').classList.add('hidden');
            document.getElementById('main-header').classList.remove('hidden');
            document.getElementById('main-nav').classList.remove('hidden');
            if(userP.email === ADMIN_EMAIL) document.getElementById('nav-admin').classList.remove('hidden');
            switchV('home', document.querySelector('.nav-item'));
        }

        function setProfileField(id, val) {
            const el = document.getElementById(id);
            if(val) {
                el.value = val;
                el.readOnly = true;
            }
        }

        function updateUI() {
            document.getElementById('h-bal').innerText = userP.br_coins.toFixed(2);
            document.getElementById('p-bal').innerText = userP.br_coins.toFixed(2);
            document.getElementById('p-name').innerText = userP.full_name;
        }

        function switchV(v, el) {
            showSplash(() => {
                document.querySelectorAll('.view').forEach(x => x.classList.add('hidden'));
                document.getElementById('view-' + v).classList.remove('hidden');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                if(el) el.classList.add('active');
                if(v === 'home') renderWd();
                if(v === 'tasks') fetchTasks();
                if(v === 'admin') { fetchSubs(); fetchWithdrawals(); fetchAdminTasks(); }
            });
        }

        // --- PROFILE LOGIC (PERMANENT) ---
        async function saveProfile() {
            buttonLoading('save-prof-btn', true);
            const d = {};
            // Only update fields that weren't already set
            if(!userP.ep_name) d.ep_name = document.getElementById('up-ep-n').value;
            if(!userP.ep_no) d.ep_no = document.getElementById('up-ep-v').value;
            if(!userP.jc_name) d.jc_name = document.getElementById('up-jc-n').value;
            if(!userP.jc_no) d.jc_no = document.getElementById('up-jc-v').value;
            if(!userP.usdt_addr) d.usdt_addr = document.getElementById('up-usdt').value;

            const { error } = await sb.from('profiles').update(d).eq('id', userP.id);
            if(!error) {
                userP = { ...userP, ...d };
                notify("Details Saved Permanently!");
                initApp(); // Refresh readonly status
            }
            buttonLoading('save-prof-btn', false);
        }

        // --- WITHDRAW LOGIC (REAL TIME DEDUCTION) ---
        async function requestWithdraw() {
            if(selectedCoins === 0) return notify("Select amount!");
            if(userP.br_coins < selectedCoins) return notify("Not enough coins!");
            
            buttonLoading('wd-btn', true);
            const method = document.getElementById('wd-method').value;
            
            // Real-time coin deduction logic
            const newBal = userP.br_coins - selectedCoins;
            
            // Update Database first
            const { error } = await sb.from('profiles').update({ br_coins: newBal }).eq('id', userP.id);
            
            if(!error) {
                // Record the request
                await sb.from('withdrawals').insert([{
                    user_id: userP.id,
                    amount_pkr: selectedPKR,
                    amount_coins: selectedCoins,
                    method: method,
                    status: 'pending'
                }]);

                // Update Local UI
                userP.br_coins = newBal;
                updateUI();
                notify("Coins Deducted. Sent to Admin!");
            } else {
                notify("Error processing withdrawal.");
            }
            buttonLoading('wd-btn', false);
        }

        // --- ADMIN TASK MANAGEMENT ---
        async function fetchAdminTasks() {
            const { data } = await sb.from('tasks').select('*');
            let h = '';
            data?.forEach(t => {
                h += `<div class="admin-sub-card">
                    <b>${t.title}</b>
                    <button class="btn btn-red" style="padding:5px; font-size:12px" onclick="deleteTask('${t.id}')">Delete Task</button>
                </div>`;
            });
            document.getElementById('ad-task-manage').innerHTML = h || 'No tasks found.';
        }

        async function deleteTask(id) {
            if(confirm("Are you sure you want to delete this task?")) {
                await sb.from('tasks').delete().eq('id', id);
                notify("Task Deleted!");
                fetchAdminTasks();
            }
        }

        async function createTask() {
            const t = {
                title: document.getElementById('ad-t').value,
                link: document.getElementById('ad-l').value,
                stages: parseInt(document.getElementById('ad-s').value),
                stage_rewards: document.getElementById('ad-r').value,
                description: document.getElementById('ad-d').value
            };
            await sb.from('tasks').insert([t]);
            notify("Task Created!");
            fetchAdminTasks();
        }

        // --- EXISTING UTILS ---
        function renderWd() {
            const container = document.getElementById('wd-opts');
            let h = '';
            const rates = [{p:300,c:420}, {p:500,c:700}, {p:1000,c:1400}, {p:2000,c:2800}];
            rates.forEach(o => h += `<div class="card" style="margin:0; text-align:center; border:2px solid #eee" onclick="setWd(${o.c}, ${o.p}, this)"><b>${o.p} PKR</b></div>`);
            container.innerHTML = h;
        }

        function setWd(c, p, el) {
            selectedCoins = c; selectedPKR = p;
            document.querySelectorAll('#wd-opts .card').forEach(x => x.style.borderColor = '#eee');
            el.style.borderColor = '#0066ff';
        }

        async function fetchWithdrawals() {
            const { data } = await sb.from('withdrawals').select('*, profiles(*)').eq('status', 'pending');
            let h = '';
            data?.forEach(w => {
                let details = w.method === 'ep' ? `EP: ${w.profiles.ep_name} (${w.profiles.ep_no})` : 
                              w.method === 'jc' ? `JC: ${w.profiles.jc_name} (${w.profiles.jc_no})` : `USDT: ${w.profiles.usdt_addr}`;
                h += `<div class="admin-sub-card">
                    <b>${w.profiles.email}</b><br>
                    Amount: <span style="color:green">${w.amount_pkr} PKR</span><br>
                    <small>${details}</small><br>
                    <button class="btn" style="padding:5px; margin-top:5px" onclick="markPaid('${w.id}')">Mark as Paid</button>
                </div>`;
            });
            document.getElementById('ad-withdrawals').innerHTML = h || '<p>No pending withdrawals.</p>';
        }

        async function markPaid(id) {
            await sb.from('withdrawals').update({ status: 'paid' }).eq('id', id);
            notify("Marked as Paid!"); fetchWithdrawals();
        }

        async function fetchTasks() {
            const { data: tasks } = await sb.from('tasks').select('*');
            const { data: subs } = await sb.from('task_submissions').select('*').eq('user_id', userP.id);
            let h = '';
            tasks.forEach(t => {
                const sub = subs.find(s => s.task_id === t.id) || { current_stage: 0, status: 'none' };
                let rewardsArr = t.stage_rewards.split(',').map(Number);
                let total = rewardsArr.reduce((a,b)=>a+b, 0);
                let lights = '';
                for(let i=1; i<=t.stages; i++) lights += `<div class="light ${i <= sub.current_stage ? 'active' : ''}"></div>`;
                let btnTxt = sub.status === 'pending' ? 'Verifying...' : 'Start Stage ' + (sub.current_stage + 1);
                if(sub.current_stage >= t.stages) btnTxt = "Completed ✅";
                h += `<div class="card">
                    <span class="task-reward-tag">Prize: ${total} Coins</span>
                    <b>${t.title}</b>
                    <div class="stage-box">${lights}</div>
                    <p style="font-size:12px">${t.description}</p>
                    <button class="btn" ${sub.status === 'pending' || sub.current_stage >= t.stages ? 'disabled' : ''} onclick="startTask(this, '${t.id}', '${t.link}')">
                        <div class="spinner"></div> <span>${btnTxt}</span>
                    </button>
                </div>`;
            });
            document.getElementById('task-list').innerHTML = h;
        }

        async function startTask(btn, tid, link) {
            const spin = btn.querySelector('.spinner');
            btn.disabled = true; spin.style.display = 'block';
            setTimeout(async () => {
                window.open(link, '_blank');
                await sb.from('task_submissions').upsert([{ user_id: userP.id, task_id: tid, status: 'pending' }], { onConflict: 'user_id, task_id' });
                notify("Sent for Approval!");
            }, 2000);
        }

        async function fetchSubs() {
            const { data } = await sb.from('task_submissions').select('*, profiles(email), tasks(title, stages, stage_rewards)').eq('status', 'pending');
            let h = '';
            data?.forEach(s => {
                h += `<div class="admin-sub-card">
                    <b>${s.profiles.email}</b> - ${s.tasks.title}<br>
                    Approving Stage: ${s.current_stage + 1}<br>
                    <button class="btn" style="padding:8px" onclick="approveStage('${s.user_id}', '${s.task_id}', ${s.current_stage}, '${s.tasks.stage_rewards}')">Approve & Pay</button>
                </div>`;
            });
            document.getElementById('ad-subs').innerHTML = h || 'No submissions.';
        }

        async function approveStage(uid, tid, curr, rewardsStr) {
            const rewards = rewardsStr.split(',').map(Number);
            const amt = rewards[curr] || 0;
            const { data: p } = await sb.from('profiles').select('br_coins').eq('id', uid).single();
            await sb.from('profiles').update({ br_coins: p.br_coins + amt }).eq('id', uid);
            await sb.from('task_submissions').update({ current_stage: curr + 1, status: 'none' }).match({ user_id: uid, task_id: tid });
            notify("Reward Sent!"); fetchSubs();
        }

        async function loginWithGoogle() { buttonLoading('login-btn', true); await sb.auth.signInWithOAuth({ provider: 'google' }); }
        function logout() { sb.auth.signOut(); location.reload(); }
    </script>
</body>
    </html>
