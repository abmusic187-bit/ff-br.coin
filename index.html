<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR.COIN Rewards</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff3b3b; --off-white: #fafafa; --black: #000000; }
        * { box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background: var(--off-white); margin: 0; color: var(--black); overflow-x: hidden; }

        /* Professional 1-Second Splash */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 99999;
            opacity: 1; transition: opacity 0.5s ease;
        }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--red); border-radius: 50%; width: 45px; height: 45px; animation: spin 0.7s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .hidden { display: none !important; }
        .card { background: white; border: 2px solid var(--black); box-shadow: 4px 4px 0px var(--black); padding: 20px; margin: 15px; border-radius: 2px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid var(--black); border-radius: 0; font-weight: bold; outline: none; }
        button { width: 100%; padding: 12px; background: var(--red); color: white; border: 2px solid var(--black); box-shadow: 3px 3px 0px var(--black); font-weight: 900; cursor: pointer; text-transform: uppercase; }
        button:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px var(--black); }

        /* UI Styling */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: white; border-bottom: 2px solid var(--black); }
        .coin-box { background: var(--red); color: white; border: 2px solid var(--black); padding: 5px 15px; text-align: center; min-width: 110px; }
        .diamond-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 15px; }
        .diamond-item { border: 2px solid var(--black); padding: 15px; text-align: center; background: white; cursor: pointer; font-weight: bold; font-size: 14px; }
        .banner { background: var(--red); color: white; text-align: center; padding: 15px; font-weight: 900; border-top: 2px solid var(--black); border-bottom: 2px solid var(--black); margin: 20px 0; }
    </style>
</head>
<body>

    <div id="splash">
        <h1 style="letter-spacing: 5px; color: var(--red); margin-bottom: 20px;">BR.COIN</h1>
        <div class="spinner"></div>
    </div>

    <div id="page-auth" class="hidden">
        <div class="card" style="max-width: 400px; margin: 50px auto;">
            <h2 id="auth-title" style="text-align:center; margin-top:0;">LOGIN</h2>
            <input type="email" id="auth-email" placeholder="EMAIL ADDRESS">
            <input type="text" id="auth-uid" placeholder="FREE FIRE UID">
            <input type="password" id="auth-pass" placeholder="PASSWORD">
            <input type="password" id="auth-pass-confirm" class="hidden" placeholder="CONFIRM PASSWORD">
            <button onclick="processAuth()" id="btn-auth-action">PROCEED</button>
            <p onclick="toggleAuthMode()" style="text-align:center; font-size:12px; cursor:pointer; margin-top:15px; font-weight:bold; text-decoration: underline;">CREATE NEW ACCOUNT?</p>
        </div>
    </div>

    <div id="page-main" class="hidden">
        <div class="header">
            <div style="background:var(--red); color:white; padding:5px; font-size:10px; font-weight:900; line-height:1;">FREE<br>DIAMOND</div>
            <div style="font-size:11px; font-weight:900;">
                USER: <span id="user-name" style="color:var(--red)">...</span><br>
                UID: <span id="user-uid-val">...</span>
            </div>
            <div class="coin-box">
                <small style="font-size:10px">BR.COIN</small><br>
                <b id="user-balance" style="font-size:20px">00.0</b>
            </div>
        </div>

        <div style="padding: 15px;">
            <h3 style="margin-top:0">2. Top-up Amount</h3>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button style="width:auto; padding:6px 20px; font-size:12px;">PURCHASE</button>
                <button style="width:auto; padding:6px 20px; font-size:12px; background:#fff; color:#000;">REDEEM</button>
            </div>

            <div class="diamond-grid">
                <div class="diamond-item" onclick="reqRedeem(1426, 2100)">💎 1,426</div>
                <div class="diamond-item" onclick="reqRedeem(3565, 5240)">💎 3,565</div>
                <div class="diamond-item" onclick="reqRedeem(7130, 10480)">💎 7,130</div>
                <div class="diamond-item" onclick="reqRedeem(14260, 20960)">💎 14,260</div>
            </div>
        </div>

        <div class="banner">INVITE FRIENDS TO GET BIG REWARDS</div>
        
        <div class="card" style="text-align:center; background:#000; color:white;">
            <p style="font-size:11px; margin:0; opacity: 0.8;">REFERRAL CODE</p>
            <h2 id="ref-code-text" style="letter-spacing:5px; margin:10px 0;">-------</h2>
        </div>

        <div style="padding:20px;">
            <button onclick="gotoTasks()" style="background:#333;">COMPLETE TASKS</button>
        </div>
    </div>

    <div id="page-admin" class="hidden" style="padding:20px;">
        <div class="card">
            <h2 style="margin-top:0">ADMIN PANEL</h2>
            <input type="text" id="adm-task-name" placeholder="Task Name">
            <input type="number" id="adm-task-reward" placeholder="Coin Amount">
            <input type="text" id="adm-task-url" placeholder="Task Link">
            <button onclick="adminAddTask()">POST NEW TASK</button>
        </div>
        <div id="admin-pending-list"></div>
    </div>

    <script>
        // --- YOUR SUPABASE CREDENTIALS ---
        const SB_URL = "https://zzehzlqhgjevwauycgdi.supabase.co"; 
        const SB_KEY = "sb_publishable_cs7l1-FeQnmB3Sl0bHfK7g_KK5qKlLh";
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        let isRegister = false;
        let userData = null;

        // --- FORCE HIDE LOADING AFTER 1 SECOND ---
        function hideLoading() {
            const splash = document.getElementById('splash');
            splash.style.opacity = "0";
            setTimeout(() => { 
                splash.style.display = "none"; 
                startApp(); // Start checking login status after splash is gone
            }, 500);
        }

        // Run the 1-second timer immediately
        setTimeout(hideLoading, 1000);

        async function startApp() {
            try {
                const { data: { user } } = await supabase.auth.getUser();
                if (user) {
                    loadProfile(user);
                } else {
                    document.getElementById('page-auth').classList.remove('hidden');
                }
            } catch (e) {
                // If Supabase fails, still show the login page
                document.getElementById('page-auth').classList.remove('hidden');
            }
        }

        function toggleAuthMode() {
            isRegister = !isRegister;
            document.getElementById('auth-title').innerText = isRegister ? "REGISTER" : "LOGIN";
            document.getElementById('auth-pass-confirm').classList.toggle('hidden');
            document.getElementById('btn-auth-action').innerText = isRegister ? "SIGN UP" : "ENTER";
        }

        async function processAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const uid = document.getElementById('auth-uid').value;

            if (!email || !pass) return alert("Please fill all fields");

            if (isRegister) {
                const { data, error } = await supabase.auth.signUp({ email, password: pass });
                if (error) return alert(error.message);
                const ref = Math.random().toString(36).substring(2, 8).toUpperCase();
                await supabase.from('profiles').insert([{ id: data.user.id, email, ff_uid: uid, referral_code: ref }]);
                alert("Success! Now please Login.");
                location.reload();
            } else {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
                if (error) return alert(error.message);
                loadProfile(data.user);
            }
        }

        async function loadProfile(user) {
            const { data: profile, error } = await supabase.from('profiles').select('*').eq('id', user.id).single();
            if (error) return alert("Profile error. Contact Admin.");
            
            userData = profile;

            if (user.email === 'sa7530006@gmail.com') {
                document.getElementById('page-auth').classList.add('hidden');
                document.getElementById('page-admin').classList.remove('hidden');
                return;
            }

            document.getElementById('user-name').innerText = profile.email.split('@')[0].toUpperCase();
            document.getElementById('user-uid-val').innerText = profile.ff_uid;
            document.getElementById('user-balance').innerText = parseFloat(profile.br_coins || 0).toFixed(1);
            document.getElementById('ref-code-text').innerText = profile.referral_code;

            document.getElementById('page-auth').classList.add('hidden');
            document.getElementById('page-main').classList.remove('hidden');
        }

        async function adminAddTask() {
            const title = document.getElementById('adm-task-name').value;
            const reward = document.getElementById('adm-task-reward').value;
            const link = document.getElementById('adm-task-url').value;
            const { error } = await supabase.from('tasks').insert([{ title, reward, link }]);
            if (error) alert("Error: " + error.message);
            else alert("Task Added Successfully!");
        }

        function reqRedeem(d, cost) {
            if (userData.br_coins < cost) alert("NOT ENOUGH COINS!");
            else alert("REDEEM REQUEST SENT FOR " + d + " DIAMONDS!");
        }

        function gotoTasks() {
            alert("Tasks coming soon!");
        }
    </script>
</body>
    </html>
