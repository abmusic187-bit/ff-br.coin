<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR.COIN | Premium Rewards</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Unique Neobrutalist CSS */
        :root {
            --accent: #ff3b3b;
            --bg: #fdfaf5;
            --text: #000000;
            --border: 3px solid #000000;
            --shadow: 5px 5px 0px #000000;
        }

        * { box-sizing: border-box; font-family: 'Helvetica Black', 'Arial Bold', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            margin: 0; 
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* splash stays on top */
        #splash {
            position: fixed; inset: 0; background: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; transition: 0.5s;
        }

        .hidden { display: none !important; }

        /* Unique Containers */
        .card {
            background: #fff;
            border: var(--border);
            box-shadow: var(--shadow);
            margin: 15px;
            padding: 20px;
            transition: 0.2s;
        }

        /* Header Style */
        .header {
            background: #fff;
            border-bottom: var(--border);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        .coin-badge {
            background: var(--accent);
            color: #fff;
            border: var(--border);
            padding: 5px 15px;
            box-shadow: 3px 3px 0px #000;
            text-align: center;
        }

        /* Buttons & Inputs */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: var(--border);
            font-size: 16px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: white;
            border: var(--border);
            box-shadow: 4px 4px 0px #000;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 1px;
        }

        button:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000;
        }

        /* Diamond Grid */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 15px;
        }

        .diamond-card {
            background: #fff;
            border: var(--border);
            padding: 20px;
            text-align: center;
            box-shadow: 3px 3px 0px #000;
            cursor: pointer;
        }

        .diamond-card:hover { background: #fff5f5; }

        .banner {
            background: #000;
            color: #fff;
            padding: 15px;
            text-align: center;
            font-weight: 900;
            transform: rotate(-1deg);
            margin: 20px -5px;
        }
    </style>
</head>
<body>

    <div id="splash">
        <h1 style="font-size: 3rem; margin: 0;">BR.COIN</h1>
        <p style="letter-spacing: 5px;">LOADING...</p>
    </div>

    <div id="page-auth" class="hidden">
        <div class="card" style="max-width: 400px; margin: 80px auto;">
            <h2 id="auth-title" style="margin-top:0;">LOGIN</h2>
            <input type="email" id="email" placeholder="GMAIL ADDRESS">
            <input type="text" id="uid" placeholder="FREE FIRE UID">
            <input type="password" id="pass" placeholder="PASSWORD">
            <input type="password" id="pass-confirm" class="hidden" placeholder="CONFIRM PASSWORD">
            <button onclick="handleAuth()">ENTER SYSTEM</button>
            <p onclick="switchAuth()" style="text-align:center; cursor:pointer; font-weight:bold; margin-top:15px; text-decoration:underline;">NEW HERE? REGISTER</p>
        </div>
    </div>

    <div id="page-main" class="hidden">
        <div class="header">
            <div>
                <div style="font-size:10px; opacity:0.6;">CURRENT USER</div>
                <div id="disp-email" style="font-weight:900;">...</div>
                <div style="font-size:10px; margin-top:5px;">UID: <span id="disp-uid">...</span></div>
            </div>
            <div class="coin-badge">
                <div style="font-size:10px;">BALANCE</div>
                <div id="disp-balance" style="font-size:20px; font-weight:900;">0.0</div>
            </div>
        </div>

        <div class="banner">FREE FIRE DIAMOND TOP-UP</div>

        <div class="grid">
            <div class="diamond-card" onclick="redeem(1426)">💎 1,426<br><small>2100 COINS</small></div>
            <div class="diamond-card" onclick="redeem(3565)">💎 3,565<br><small>5240 COINS</small></div>
            <div class="diamond-card" onclick="redeem(7130)">💎 7,130<br><small>10480 COINS</small></div>
            <div class="diamond-card" onclick="redeem(14260)">💎 14,260<br><small>20960 COINS</small></div>
        </div>

        <div class="card" style="background:#000; color:#fff; text-align:center;">
            <div style="font-size:10px;">YOUR REFERRAL CODE</div>
            <div id="disp-ref" style="font-size:24px; letter-spacing:5px; margin:10px 0;">-------</div>
            <p style="font-size:11px; color:var(--accent);">EARN 70 COINS PER INVITE</p>
        </div>

        <div style="padding:15px;">
            <button style="background:#000;" onclick="alert('Task Page Loading...')">GO TO TASK CENTER</button>
        </div>
    </div>

    <div id="page-admin" class="hidden" style="padding:20px;">
        <div class="card">
            <h2>ADMIN PANEL</h2>
            <input type="text" id="task-title" placeholder="Task Name">
            <input type="number" id="task-reward" placeholder="Coin Amount">
            <input type="text" id="task-link" placeholder="Task URL">
            <button onclick="addTask()">POST TASK</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://zzehzlqhgjevwauycgdi.supabase.co"; 
        const SB_KEY = "sb_publishable_cs7l1-FeQnmB3Sl0bHfK7g_KK5qKlLh";
        let sb;

        // 1. FORCED LOADING FINISH
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('splash').style.display = "none";
                    initApp();
                }, 500);
            }, 1000);
        };

        function initApp() {
            try {
                sb = supabase.createClient(SB_URL, SB_KEY);
                checkUser();
            } catch (e) {
                console.error("Supabase load error");
                document.getElementById('page-auth').classList.remove('hidden');
            }
        }

        async function checkUser() {
            const { data: { user } } = await sb.auth.getUser();
            if (user) loadData(user);
            else document.getElementById('page-auth').classList.remove('hidden');
        }

        let isReg = false;
        function switchAuth() {
            isReg = !isReg;
            document.getElementById('auth-title').innerText = isReg ? "REGISTER" : "LOGIN";
            document.getElementById('pass-confirm').classList.toggle('hidden');
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const uid = document.getElementById('uid').value;

            if (isReg) {
                const { data, error } = await sb.auth.signUp({ email, password: pass });
                if (error) return alert(error.message);
                const refCode = Math.random().toString(36).substring(2, 8).toUpperCase();
                await sb.from('profiles').insert([{ id: data.user.id, email, ff_uid: uid, referral_code: refCode }]);
                alert("Success! Now Login.");
                location.reload();
            } else {
                const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
                if (error) return alert(error.message);
                loadData(data.user);
            }
        }

        async function loadData(user) {
            if (user.email === 'sa7530006@gmail.com') {
                document.getElementById('page-auth').classList.add('hidden');
                document.getElementById('page-admin').classList.remove('hidden');
                return;
            }

            const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
            if (profile) {
                document.getElementById('disp-email').innerText = profile.email.toUpperCase();
                document.getElementById('disp-uid').innerText = profile.ff_uid;
                document.getElementById('disp-balance').innerText = parseFloat(profile.br_coins || 0).toFixed(1);
                document.getElementById('disp-ref').innerText = profile.referral_code;
                
                document.getElementById('page-auth').classList.add('hidden');
                document.getElementById('page-main').classList.remove('hidden');
            }
        }

        async function addTask() {
            const title = document.getElementById('task-title').value;
            const reward = document.getElementById('task-reward').value;
            const link = document.getElementById('task-link').value;
            const { error } = await sb.from('tasks').insert([{ title, reward, link }]);
            if (error) alert(error.message);
            else alert("Task Added!");
        }

        function redeem(amt) { alert("Redeem request sent for " + amt + " Diamonds!"); }
    </script>
</body>
                                                               </html>
